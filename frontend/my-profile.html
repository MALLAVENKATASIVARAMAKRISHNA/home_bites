<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Home Bites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="dashboard order-dashboard">
    <nav class="dash-nav">
      <button class="dash-brand brand-home-btn" type="button" onclick="goToRoleDashboard()" aria-label="Go to dashboard">
        <img src="./assets/logo.png" alt="Home Bites logo" />
        <div>
          <strong>Home Bites</strong>
          <p>Account details</p>
        </div>
      </button>

      <div class="dash-search-wrap order-page-search-note">
        <p>Check and confirm your profile details below.</p>
      </div>

      <div class="dash-actions">
        <button class="cart-quick-btn" type="button" onclick="goToDashboard()">Back to Dashboard</button>
        <button class="cart-quick-btn" type="button" onclick="goToMyOrders()">My Orders</button>
        <button class="profile-logout-btn small-logout" type="button" onclick="logout()">Logout</button>
      </div>
    </nav>

    <main class="order-main">
      <section class="order-hero">
        <h1>My Profile</h1>
        <p>Your account information used for orders and delivery.</p>
      </section>

      <section class="orders-page-panel profile-page-panel">
        <div class="panel-head">
          <h2>Profile Details</h2>
          <span id="profileMeta"></span>
        </div>

        <div id="profileMessage" class="alert"></div>
        <div id="profileContent" class="profile-grid"></div>
        <div class="profile-edit-actions">
          <button id="saveProfileBtn" class="cart-quick-btn" type="button">Save Changes</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./ui.js"></script>
  <script>
    let user = getStoredUser();
    const editableFields = {
      name: { minLen: 2, label: 'Name' },
      address: { minLen: 5, label: 'Address' },
      city: { minLen: 2, label: 'City' }
    };
    let editingState = { name: false, address: false, city: false };
    let draftProfile = { name: '', address: '', city: '' };

    if (!hasStoredSession()) {
      clearStoredAuth();
      window.location.href = './index.html';
    }

    startSessionExpiryWatcher(() => {
      window.location.href = './index.html';
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function valueOrFallback(value) {
      if (value === null || value === undefined) return '-';
      const text = String(value).trim();
      return text ? text : '-';
    }

    function getEditableValue(profile, key) {
      const text = String(profile?.[key] ?? '').trim();
      return text;
    }

    function resetDraftFromUser(profile) {
      draftProfile.name = getEditableValue(profile, 'name');
      draftProfile.address = getEditableValue(profile, 'address');
      draftProfile.city = getEditableValue(profile, 'city');
    }

    function syncDraftFromInputs() {
      Object.keys(editableFields).forEach((key) => {
        if (!editingState[key]) return;
        const input = document.getElementById(`inlineEdit_${key}`);
        if (input) {
          draftProfile[key] = input.value;
        }
      });
    }

    function hasProfileData(profile) {
      if (!profile || typeof profile !== 'object') return false;
      return Boolean(
        String(profile.name || '').trim() ||
        String(profile.email || '').trim() ||
        String(profile.phone_number || '').trim() ||
        String(profile.address || '').trim() ||
        String(profile.city || '').trim()
      );
    }

    function toggleProfileFieldEdit(field) {
      if (!editableFields[field]) return;
      syncDraftFromInputs();

      if (editingState[field]) {
        draftProfile[field] = getEditableValue(user, field);
      }
      editingState[field] = !editingState[field];
      renderProfile(user);

      if (editingState[field]) {
        const input = document.getElementById(`inlineEdit_${field}`);
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
    }

    function hasProfileChanges(values) {
      return (
        values.name !== getEditableValue(user, 'name') ||
        values.address !== getEditableValue(user, 'address') ||
        values.city !== getEditableValue(user, 'city')
      );
    }

    function renderProfile(profile) {
      const content = document.getElementById('profileContent');
      const meta = document.getElementById('profileMeta');

      const details = [
        { key: 'name', label: 'Full Name', value: valueOrFallback(profile.name), editable: true },
        { key: 'email', label: 'Email', value: valueOrFallback(profile.email), editable: false },
        { key: 'phone_number', label: 'Phone Number', value: valueOrFallback(profile.phone_number), editable: false },
        { key: 'address', label: 'Address', value: valueOrFallback(profile.address), editable: true },
        { key: 'city', label: 'City', value: valueOrFallback(profile.city), editable: true }
      ];

      content.innerHTML = details.map((detail) => `
        <article class="profile-card">
          <div class="profile-card-head">
            <p class="profile-label">${escapeHtml(detail.label)}</p>
            ${detail.editable ? `
              <button
                class="edit-icon-btn"
                type="button"
                onclick="toggleProfileFieldEdit('${escapeHtml(detail.key)}')"
                aria-label="Edit ${escapeHtml(detail.label)}"
                title="Edit ${escapeHtml(detail.label)}"
              >✎</button>
            ` : ''}
          </div>
          ${detail.editable && editingState[detail.key] ? `
            <input
              id="inlineEdit_${escapeHtml(detail.key)}"
              class="profile-inline-input"
              type="text"
              value="${escapeHtml(String(draftProfile[detail.key] ?? ''))}"
            />
          ` : `
            <strong class="profile-value">${escapeHtml(detail.value)}</strong>
          `}
        </article>
      `).join('');

      meta.textContent = '';
    }

    async function loadProfile() {
      const message = document.getElementById('profileMessage');
      clearAlert(message);

      resetDraftFromUser(user);
      editingState = { name: false, address: false, city: false };
      renderProfile(user);

      try {
        const res = await apiFetch(`${API_BASE_URL}/me`);

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to load profile');

        user = { ...user, ...data };
        localStorage.setItem('user', JSON.stringify(user));
        resetDraftFromUser(user);
        renderProfile(user);
      } catch (err) {
        if (!hasProfileData(user)) {
          setAlert(message, 'error', err.message || 'Could not refresh profile details');
        }
      }
    }

    async function saveProfile() {
      const message = document.getElementById('profileMessage');
      const saveBtn = document.getElementById('saveProfileBtn');
      clearAlert(message);
      syncDraftFromInputs();

      const name = String(draftProfile.name || '').trim();
      const address = String(draftProfile.address || '').trim();
      const city = String(draftProfile.city || '').trim();

      if (!hasProfileChanges({ name, address, city })) {
        setAlert(message, 'error', 'No changes to save.');
        return;
      }

      if (name.length < 2) {
        setAlert(message, 'error', 'Name should be at least 2 characters.');
        return;
      }
      if (address.length < 5) {
        setAlert(message, 'error', 'Address should be at least 5 characters.');
        return;
      }
      if (city.length < 2) {
        setAlert(message, 'error', 'City should be at least 2 characters.');
        return;
      }

      setButtonLoading(saveBtn, 'Saving...', true);
      try {
        const res = await apiFetch(`${API_BASE_URL}/me/profile`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, address, city })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to update profile');

        user = { ...user, ...data };
        localStorage.setItem('user', JSON.stringify(user));
        editingState = { name: false, address: false, city: false };
        resetDraftFromUser(user);
        renderProfile(user);
        setAlert(message, 'success', 'Profile updated successfully.');
      } catch (err) {
        setAlert(message, 'error', err.message || 'Could not update profile');
      } finally {
        setButtonLoading(saveBtn, 'Saving...', false);
      }
    }

    function goToDashboard() {
      window.location.href = './index.html';
    }

    function goToMyOrders() {
      window.location.href = './my-orders.html';
    }

    function goToRoleDashboard() {
      const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
      window.location.href = currentUser.role === 'admin' ? './admin.html' : './index.html';
    }

    async function logout() {
      stopSessionExpiryWatcher();
      await logoutSession();
      window.location.href = './index.html';
    }

    window.toggleProfileFieldEdit = toggleProfileFieldEdit;
    document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
    loadProfile();
  </script>
  <style>
    .profile-page-panel {
      margin-bottom: 20px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      padding-top: 8px;
    }

    .profile-card {
      border: 1px solid #eaecf0;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(16, 24, 40, 0.05);
    }

    .profile-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .profile-label {
      margin: 0 0 8px;
      font-size: 0.78rem;
      color: #667085;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      font-weight: 700;
    }

    .edit-icon-btn {
      border: 1px solid #d0d5dd;
      background: #fff;
      border-radius: 8px;
      height: 28px;
      min-width: 28px;
      padding: 0 6px;
      line-height: 1;
      font-size: 14px;
      color: #475467;
      cursor: pointer;
    }

    .edit-icon-btn:hover {
      border-color: #f97316;
      color: #c2410c;
      background: #fff7ed;
    }

    .profile-value {
      margin: 0;
      font-size: 0.97rem;
      color: #101828;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .profile-inline-input {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: #101828;
      background: #fff;
      margin-top: 2px;
    }

    .profile-inline-input:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.16);
    }

    .profile-edit-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    .hb-footer {
      margin-top: 32px;
      padding: 26px 18px 18px;
      background: linear-gradient(145deg, #f3dcc5 0%, #f8f1e6 45%, #f0c38f 100%);
      color: #3c2616;
      border-top: 2px solid rgba(135, 72, 22, 0.18);
    }

    .hb-footer-contact {
      text-align: center;
      font-size: 14px;
      margin: 10px 0 8px;
    }

    .hb-footer-contact a {
      color: #7d260f;
      text-decoration: none;
      font-weight: 600;
    }

    .hb-footer-contact a:hover {
      text-decoration: underline;
    }

    .hb-footer-copy {
      margin: 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
  <footer class="hb-footer">
    <p class="hb-footer-contact">Phone: <a href="tel:9014763361">9014763361</a> | Email: <a href="mailto:homebites@03112003.xyz">homebites@03112003.xyz</a></p>
    <p class="hb-footer-copy">© 2026 Home Bites. All rights reserved.</p>
  </footer>
</body>
</html>
